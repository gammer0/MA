services:

  # ============ 基础设施 ============
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_security                      # 数据库名
      POSTGRES_USER: agent                             # 数据库用户
      POSTGRES_PASSWORD: dev_password_123              # 数据库密码（生产环境需替换）
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ============ 微服务 ============
  identity-service:
    build:
      context: ../services/identity-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://agent:dev_password_123@postgres:5432/agent_security
      REDIS_URL: redis://redis:6379/0                   # Redis DB 0: 公钥缓存
      ADMIN_API_KEY: admin-secret-key-dev               # 管理接口密钥（生产环境需替换）
      SERVICE_API_KEY: service-secret-key-dev           # 服务间调用密钥（生产环境需替换）
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  permission-gateway:
    build:
      context: ../services/permission-gateway
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://agent:dev_password_123@postgres:5432/agent_security
      REDIS_URL: redis://redis:6379/1                   # Redis DB 1: 令牌视图缓存
      IDENTITY_SERVICE_URL: http://identity-service:8001  # 身份注册服务地址
      AUDIT_SERVICE_URL: http://audit-service:8003        # 审计模块地址
      ADMIN_API_KEY: admin-secret-key-dev               # 管理接口密钥（生产环境需替换）
      SERVICE_API_KEY: service-secret-key-dev           # 服务间调用密钥（生产环境需替换）
    depends_on:
      - identity-service
    restart: unless-stopped

  audit-service:
    build:
      context: ../services/audit-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://agent:dev_password_123@postgres:5432/agent_security
      ADMIN_API_KEY: admin-secret-key-dev               # 管理接口密钥（生产环境需替换）
      SERVICE_API_KEY: service-secret-key-dev           # 服务间调用密钥（生产环境需替换）
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  execution-layer:
    build:
      context: ../demo-app                              # 独立演示项目
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      GATEWAY_URL: http://permission-gateway:8002        # 权限网关地址
      ADMIN_API_KEY: admin-secret-key-dev               # 管理密钥（供凭证注入）
    depends_on:
      - permission-gateway
    restart: unless-stopped

  feishu-demo-app:
    build:
      context: ../feishu-demo-app                       # 飞书演示项目
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      GATEWAY_URL: http://permission-gateway:8002
      ADMIN_API_KEY: admin-secret-key-dev
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
    command: python3 -m uvicorn main:app --host 0.0.0.0 --port 8005
    depends_on:
      - permission-gateway
    restart: unless-stopped

volumes:
  pg_data:
