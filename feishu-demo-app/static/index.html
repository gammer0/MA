<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞书 Agent 协作 — 权限系统演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:20px;color:#58a6ff}
.header span{font-size:13px;color:#8b949e}
.container{max-width:1200px;margin:0 auto;padding:24px}
.input-area{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:24px}
.input-area label{display:block;font-size:14px;color:#8b949e;margin-bottom:8px}
.input-area input{width:100%;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;outline:none}
.input-area input:focus{border-color:#58a6ff}
.input-area button{margin-top:12px;padding:10px 24px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
.input-area button:hover{background:#2ea043}
.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
.panel h2{font-size:16px;color:#58a6ff;margin-bottom:12px;border-bottom:1px solid #30363d;padding-bottom:8px}
.trace-line{font-family:monospace;font-size:13px;padding:2px 0}
.trace-line.allowed{color:#3fb950}
.trace-line.denied{color:#f85149}
.event-item{padding:8px 12px;margin:4px 0;border-radius:6px;font-size:13px}
.event-item.info{background:#1f2937;border-left:3px solid #58a6ff}
.event-item.success{background:#1a2332;border-left:3px solid #3fb950}
.event-item.error{background:#2d1b1b;border-left:3px solid #f85149}
pre{font-size:13px;color:#c9d1d9;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;background:#0d1117;padding:12px;border-radius:6px}
</style>
</head>
<body>
<div class="header">
  <h1>&#128274; 飞书 Agent 协作</h1>
  <span>权限系统演示 — 正常委托 & 越权拦截</span>
</div>
<div class="container">
  <div class="input-area">
    <label>自然语言任务指令</label>
    <input type="text" id="instruction" value="查询团队日历和多维表格项目进度，结合外部行业动态，生成周报写入飞书文档" placeholder="输入任务指令...">
    <button id="btn-execute" onclick="executeTask()">执行任务</button>
  </div>
  <div class="panel">
    <h2>&#128221; Agent 调用链</h2>
    <div id="trace-panel">等待任务执行...</div>
  </div>
  <div class="panel">
    <h2>&#128680; 安全事件</h2>
    <div id="events">等待任务执行...</div>
  </div>
  <div class="panel">
    <h2>&#128196; 任务结果</h2>
    <pre id="result-panel">等待任务执行...</pre>
  </div>
</div>
<script>
async function executeTask() {
  const btn = document.getElementById('btn-execute');
  btn.disabled = true; btn.textContent = '执行中...';
  document.getElementById('trace-panel').innerHTML = '';
  document.getElementById('events').innerHTML = '';
  document.getElementById('result-panel').textContent = '等待任务执行...';

  try {
    const res = await fetch('/tasks/execute', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({instruction: document.getElementById('instruction').value})
    });
    const data = await res.json();
    const taskId = data.task_id;
    addEvent('info', '📋 Task ID: ' + taskId);
    addEvent('info', '任务已启动');
    connectWS(taskId);
  } catch(e) {
    addEvent('error', '启动失败: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '执行任务';
}

function connectWS(taskId) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws/tasks/${taskId}`);
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.event === 'task_completed') {
      showResult(d.result);
    } else if (d.event === 'task_failed') {
      addEvent('error', '❌ ' + d.message);
    }
  };
}

function addEvent(cls, msg) {
  const div = document.createElement('div');
  div.className = `event-item ${cls}`;
  div.textContent = msg;
  document.getElementById('events').appendChild(div);
}

function showResult(r) {
  const traceEl = document.getElementById('trace-panel');
  if (r.trace) {
    traceEl.innerHTML = r.trace.map(t => {
      const icon = t.status === 'allowed' ? '✅' : (t.status === 'denied' ? '🔴' : '⏳');
      return `<div class="trace-line ${t.status}">${icon} ${t.caller} → ${t.target} [${t.call_type}] ${t.status}</div>`;
    }).join('');
  }
  // 显示安全事件（deny 拦截）
  if (r.security_events) {
    r.security_events.forEach(e => {
      addEvent('error', '🔴 ' + e.detail);
      addEvent('info', '   ' + e.result);
    });
  }
  addEvent('success', '✅ 任务完成: ' + r.task_id);
  addEvent('info', '📋 管理员可在权限管理页面通过 Task ID 查询完整审计日志');
  document.getElementById('result-panel').textContent = JSON.stringify({
    steps: r.steps, enterprise_data_ok: !!r.enterprise_data,
    external_search_ok: !!r.external_search, report_ok: !!r.report
  }, null, 2);
}
</script>
</body>
</html>
