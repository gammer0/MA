<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 安全系统 - 多Agent协作演示控制台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:20px;color:#58a6ff}
.header span{font-size:13px;color:#8b949e}
.container{max-width:1200px;margin:0 auto;padding:24px}
.input-area{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:24px}
.input-area label{display:block;font-size:14px;color:#8b949e;margin-bottom:8px}
.input-area input{width:100%;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;outline:none}
.input-area input:focus{border-color:#58a6ff}
.input-area button{margin-top:12px;padding:10px 24px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
.input-area button:hover{background:#2ea043}
.input-area button:disabled{opacity:.5;cursor:not-allowed}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px}
.panel h2{font-size:16px;color:#58a6ff;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #30363d}
.trace-tree{font-family:'Cascadia Code',monospace;font-size:13px;line-height:1.8;white-space:pre}
.trace-tree .allowed{color:#3fb950}
.trace-tree .denied{color:#f85149}
.trace-tree .pending{color:#d29922}
.log-list{max-height:400px;overflow-y:auto}
.log-item{padding:6px 0;font-size:13px;border-bottom:1px solid #21262d;display:flex;gap:8px}
.log-item .time{color:#8b949e;white-space:nowrap}
.log-item .allowed{color:#3fb950}
.log-item .denied{color:#f85149}
.events-panel{margin-top:24px}
.event-item{padding:8px 12px;margin:4px 0;border-radius:6px;font-size:13px}
.event-item.info{background:#1f2937;border-left:3px solid #58a6ff}
.event-item.success{background:#1a2332;border-left:3px solid #3fb950}
.event-item.error{background:#2d1b1b;border-left:3px solid #f85149}
.event-item.warn{background:#2d2514;border-left:3px solid #d29922}
</style>
</head>
<body>
<div class="header">
  <h1>&#128274; Agent 安全系统</h1>
  <span>多Agent协作演示控制台</span>
</div>
<div class="container">
  <div class="input-area">
    <label>任务指令 (自然语言)</label>
    <input type="text" id="instruction" value="搜索Python Ed25519用法，分析并生成报告" placeholder="输入任务指令...">
    <button id="btn-execute" onclick="executeTask()">执行任务</button>
  </div>
  <div class="grid">
    <div class="panel">
      <h2>&#128221; 调用链</h2>
      <div class="trace-tree" id="trace-tree">等待任务执行...</div>
    </div>
    <div class="panel">
      <h2>&#128269; 审计日志</h2>
      <div class="log-list" id="log-list">等待任务执行...</div>
    </div>
  </div>
  <div class="panel events-panel">
    <h2>&#128680; 安全事件</h2>
    <div id="events">等待任务执行...</div>
  </div>
</div>

<script>
let ws = null;
let logCount = 0;

async function executeTask() {
  const instruction = document.getElementById('instruction').value;
  const btn = document.getElementById('btn-execute');
  btn.disabled = true;
  btn.textContent = '执行中...';
  document.getElementById('trace-tree').innerHTML = '';
  document.getElementById('log-list').innerHTML = '';
  document.getElementById('events').innerHTML = '';
  logCount = 0;

  try {
    const res = await fetch('/tasks/execute', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({instruction})
    });
    const data = await res.json();
    const taskId = data.task_id;
    connectWebSocket(taskId);
    addLog('info', '任务已启动: ' + taskId);
    addEvent('info', '任务已启动: ' + instruction);
    addEvent('warn', '⏳ 等待任务执行结果...');
  } catch(e) {
    addEvent('error', '任务启动失败: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '执行任务';
}

function connectWebSocket(taskId) {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/ws/tasks/${taskId}`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleEvent(data);
  };
  ws.onclose = () => {
    addLog('info', 'WebSocket 连接已关闭');
  };
  ws.onerror = () => {
    addEvent('error', 'WebSocket 连接错误');
  };
}

function addLog(cls, msg) {
  const div = document.createElement('div');
  div.className = 'log-item';
  div.innerHTML = `<span class="${cls}">${msg}</span>`;
  document.getElementById('log-list').appendChild(div);
}

function addEvent(cls, msg) {
  const div = document.createElement('div');
  div.className = `event-item ${cls}`;
  div.textContent = msg;
  document.getElementById('events').appendChild(div);
}

function handleEvent(data) {
  if (data.event === 'task_completed') {
    addEvent('success', '✅ 任务完成: ' + data.task_id);
  } else if (data.event === 'step') {
    addEvent('info', `📋 ${data.message}`);
  } else if (data.event === 'step_done') {
    addEvent('success', `✅ ${data.message}`);
  } else if (data.event === 'step_failed') {
    addEvent('error', `❌ ${data.message}`);
  } else if (data.event === 'task_failed') {
    addEvent('error', `❌ ${data.message}`);
  }
}
</script>
</body>
</html>
