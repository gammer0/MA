<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>权限订阅管理 - Agent 安全系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;color:#58a6ff}
.header .nav{display:flex;gap:12px}
.header .nav a{color:#8b949e;text-decoration:none;font-size:14px;padding:6px 12px;border-radius:6px}
.header .nav a:hover,.header .nav a.active{background:#21262d;color:#c9d1d9}
.container{max-width:1400px;margin:0 auto;padding:24px 24px 0}
.grid{display:grid;grid-template-columns:260px 1fr;gap:24px}
.sidebar{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.sidebar h3{font-size:14px;color:#8b949e;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.agent-item{padding:10px 12px;margin:4px 0;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px;transition:background .2s}
.agent-item:hover{background:#21262d}
.agent-item.active{background:#1f6feb33;border:1px solid #1f6feb}
.agent-item .badge{font-size:11px;padding:2px 6px;border-radius:4px;background:#21262d;color:#8b949e}
.main{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:24px}
.main h2{font-size:18px;color:#58a6ff;margin-bottom:8px}
.main .desc{font-size:13px;color:#8b949e;margin-bottom:24px}
.section{margin-bottom:24px}
.section h3{font-size:14px;color:#c9d1d9;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #21262d}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.tool-item{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px}
.tool-item:hover{border-color:#58a6ff}
.tool-item.allowed{border-color:#3fb950;background:#1a2332}
.tool-item.denied{border-color:#f85149;background:#2d1b1b}
.tool-item .icon{font-size:20px;margin-top:2px}
.tool-item .info{flex:1}
.tool-item .name{font-size:14px;font-weight:600}
.tool-item .owner{font-size:11px;color:#8b949e;margin-top:2px}
.tool-item .status{font-size:11px;margin-top:4px}
.tool-item .status.allow{color:#3fb950}
.tool-item .status.deny{color:#f85149}
.tool-item .actions{margin-top:8px;display:flex;gap:4px}
.tool-item .actions button{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer}
.tool-item .actions button.allow-btn:hover{background:#238636;border-color:#238636;color:#fff}
.tool-item .actions button.deny-btn:hover{background:#da3633;border-color:#da3633;color:#fff}
.tool-item .actions button.none-btn:hover{background:#30363d}
.agent-list-section{margin-bottom:24px}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.agent-target-item{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;text-align:center;font-size:14px}
.agent-target-item:hover{border-color:#58a6ff}
.agent-target-item.allowed{border-color:#3fb950;background:#1a2332}
.agent-target-item.denied{border-color:#f85149;background:#2d1b1b}
.token-summary{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:16px;margin-top:24px}
.token-summary h3{font-size:14px;margin-bottom:8px}
.token-summary pre{font-size:12px;color:#8b949e;overflow-x:auto}
.btn-row{margin-top:16px;display:flex;gap:8px}
.btn{padding:10px 24px;border-radius:6px;font-size:14px;cursor:pointer;border:none}
.btn-primary{background:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-danger{background:#da3633;color:#fff}
.btn-danger:hover{background:#f85149}
.btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.btn-secondary:hover{background:#30363d}
.api-key-bar{background:#161b22;border-bottom:1px solid #30363d;padding:8px 24px;display:flex;align-items:center;gap:8px}
.api-key-bar label{font-size:12px;color:#8b949e;white-space:nowrap}
.api-key-bar input{flex:1;max-width:400px;padding:6px 10px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;font-size:13px}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;animation:slideIn .3s}
.toast.success{background:#238636;color:#fff}
.toast.error{background:#da3633;color:#fff}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.empty{text-align:center;padding:40px;color:#8b949e;font-size:14px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.upload-area{border:2px dashed #30363d;border-radius:8px;padding:30px;text-align:center;margin-bottom:20px;cursor:pointer}
.upload-area:hover{border-color:#58a6ff}
.upload-area input[type=file]{display:none}
.progress-bar{height:4px;background:#21262d;border-radius:2px;margin:12px 0}
.progress-bar div{height:100%;background:#238636;border-radius:2px;transition:width .3s}
.log-area{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;max-height:300px;overflow-y:auto;font-size:12px;font-family:monospace}
.log-area .ok{color:#3fb950}
.log-area .err{color:#f85149}
.log-area .warn{color:#d29922}
.pending-item{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;margin:8px 0}
.pending-header{display:flex;justify-content:space-between;font-size:14px}
.pending-time{font-size:11px;color:#8b949e}
.pending-reason{font-size:13px;color:#c9d1d9;margin:4px 0}
.pending-entries{font-size:12px;color:#8b949e}
.btn-sm{padding:4px 12px!important;font-size:12px!important}
.mode-btn{background:#21262d!important;color:#8b949e!important;border:1px solid #30363d!important}
.mode-btn.active{background:#1f6feb33!important;color:#58a6ff!important;border-color:#1f6feb!important}
</style>
</head>
<body>
<div class="header">
  <h1>&#128274; 权限订阅管理</h1>
  <div class="nav">
    <a href="#" class="active" data-tab="register" onclick="switchTab('register')">📋 批量注册</a>
    <a href="#" data-tab="tokens" onclick="switchTab('tokens')">🔑 令牌订阅</a>
    <a href="http://localhost:8004" target="_blank">执行层控制台 →</a>
  </div>
</div>
<div class="api-key-bar">
  <label>Admin API Key:</label>
  <input type="password" id="api-key-input" value="admin-secret-key-dev" placeholder="输入管理API Key">
</div>
<div class="container">
  <!-- Tab 1: 批量注册 -->
  <div class="tab-panel active" id="tab-register">
    <div class="main" style="max-width:800px;margin:0 auto">
      <h2>📋 Agent 与 Tool 批量注册</h2>
      <div class="desc">上传 agent_tool_manifest.json 文件，一键注册所有 Agent 和 MCP 工具</div>
      <div class="upload-area" id="upload-area" onclick="document.getElementById('manifest-file').click()">
        <div>📁 点击上传 manifest.json 文件</div>
        <div style="font-size:12px;color:#8b949e;margin-top:4px">或拖拽文件到此处</div>
        <input type="file" id="manifest-file" accept=".json" onchange="handleFileSelect(event)">
      </div>
      <div id="register-status" style="font-size:13px;color:#8b949e;margin-bottom:12px">等待上传文件...</div>
      <div class="progress-bar"><div id="progress" style="width:0%"></div></div>
      <div class="log-area" id="register-log"></div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn btn-primary" id="btn-register" onclick="batchRegister()" disabled>🚀 开始注册</button>
        <span style="font-size:12px;color:#8b949e;margin-left:12px" id="register-hint">注册完成后自动注入凭证到执行层</span>
      </div>
    </div>
  </div>
  <!-- Tab 2: 令牌订阅 -->
  <div class="tab-panel" id="tab-tokens">
  <div class="grid">
    <div class="sidebar" id="agent-sidebar">
      <h3>Agent 列表</h3>
      <div id="agent-list">加载中...</div>
    </div>
    <div class="main" id="config-panel">
      <h2>选择左侧 Agent 开始配置</h2>
      <div class="desc">点击 Agent 后，通过点击 Tool 和 Agent 项来配置 allow/deny 权限规则</div>
    </div>
  </div>
  </div>
  </div>
  <!-- 审批窗口（全局，所有tab可见） -->
  <div id="approval-panel" style="max-width:1400px;margin:24px auto 0;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-size:14px;color:#c9d1d9">⏳ 权限申请审批</h3>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm mode-btn active" id="mode-manual" onclick="setApprovalMode('manual')" style="padding:4px 12px;font-size:12px">人工审批</button>
        <button class="btn btn-sm mode-btn" id="mode-auto" onclick="setApprovalMode('auto')" style="padding:4px 12px;font-size:12px">自动降级</button>
      </div>
    </div>
    <div id="approval-status" style="font-size:12px;color:#8b949e;margin-bottom:12px">当前模式: 人工审批</div>
    <div id="pending-list"><div class="empty">暂无待审批请求</div></div>
  </div>
  <div id="toast-container"></div>
</div>

<script src="/static/admin.js"></script>
</body>
</html>
